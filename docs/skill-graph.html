    a:hover { text-decoration: underline; }
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      border-bottom: 1px solid var(--line);
      background: rgba(17, 19, 21, 0.92);
      backdrop-filter: blur(16px);
    }
    .topbar-inner {
      max-width: 1560px;
      margin: 0 auto;
      padding: 16px 22px;
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      gap: 18px;
      align-items: center;
    }
    h1 { margin: 0; font-size: 24px; line-height: 1.15; letter-spacing: 0; }
    .subtitle { margin-top: 5px; color: var(--muted); font-size: 14px; }
    .actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-soft);
      color: var(--ink);
      padding: 7px 11px;
      cursor: pointer;
    }
    .button:hover { border-color: var(--accent); text-decoration: none; }
    .shell {
      max-width: 1560px;
      margin: 0 auto;
      padding: 18px 22px 24px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 340px;
      gap: 16px;
    }
    .graph-panel,
    .side-panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto auto;
      gap: 8px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: #15191c;
    }
    input[type="search"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #0f1214;
      color: var(--ink);
      padding: 8px 10px;
      outline: none;
    }
    input[type="search"]:focus { border-color: var(--accent); }
    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }
    .toggle input { accent-color: var(--accent); }
    .graph-wrap {
      position: relative;
      height: min(76vh, 820px);
      min-height: 620px;
      background:
        radial-gradient(circle at 50% 50%, rgba(98, 211, 199, 0.08), transparent 34%),
        linear-gradient(180deg, #111416, #0c0f11);
    }
    svg { display: block; width: 100%; height: 100%; }
    .edge {
      stroke: var(--line-soft);
      stroke-width: 1.15;
      transition: opacity 140ms ease, stroke 140ms ease, stroke-width 140ms ease;
    }
    .edge.hidden { opacity: 0; pointer-events: none; }
    .edge.dim { opacity: 0.06; }
    .edge.active {
      stroke: var(--accent);
      stroke-width: 2.2;
      opacity: 0.9;
    }
    .node circle {
      fill: #22282c;
      stroke: #647074;
      stroke-width: 1.2;
      transition: opacity 140ms ease, fill 140ms ease, stroke 140ms ease, r 140ms ease;
    }
    .node-hit {
      fill: rgba(255, 255, 255, 0);
      stroke: none;
      pointer-events: all;
    }
    .node text {
      fill: #cbd5d6;
      font-size: 11px;
      paint-order: stroke;
      stroke: rgba(12, 15, 17, 0.9);
      stroke-width: 3px;
      pointer-events: none;
      transition: opacity 140ms ease, fill 140ms ease;
    }
    .node { cursor: pointer; }
    .node.dim circle,
    .node.dim text { opacity: 0.18; }
    .node.connected circle {
      fill: #263338;
      stroke: #9bd8d2;
    }
    .node.connected text { fill: #eef9f7; }
    .node.active circle {
      fill: var(--accent);
      stroke: #ecfffb;
      stroke-width: 2.3;
    }
    .node.active text { fill: #ffffff; }
    .node.proposed circle { stroke-dasharray: 4 3; }
    .side-panel { padding: 16px; }
    .panel-title { font-weight: 800; font-size: 18px; line-height: 1.2; }
    .panel-meta { margin-top: 8px; color: var(--muted); font-size: 13px; }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border: 1px solid currentColor;
      border-radius: 999px;
      padding: 3px 8px;
      margin: 8px 6px 0 0;
      font-size: 12px;
      font-weight: 740;
    }
    .pill.existing { color: var(--blue); }
    .pill.proposed { color: var(--green); }
    .pill.filled { color: var(--green); }
    .pill.partial { color: var(--amber); }
    .pill.planned { color: var(--muted); }
    .section { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); }
    .section h2 { margin: 0 0 8px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .detail-text { color: #dce4e4; font-size: 14px; }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
      color: var(--ink);
      background: var(--panel-soft);
      font-size: 12px;
      cursor: pointer;
    }
    .chip:hover { border-color: var(--accent); text-decoration: none; }
    .legend {
      position: absolute;
      left: 14px;
      bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      pointer-events: none;
    }
    .legend span {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(17, 19, 21, 0.72);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 4px 8px;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); }
    @media (max-width: 1050px) {
      .shell { grid-template-columns: 1fr; }
      .topbar-inner { grid-template-columns: 1fr; }
      .actions { justify-content: flex-start; }
      .graph-wrap { min-height: 560px; }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>

      adjacency.get(edge.target)?.add(edge.source);
    });
    let activeId = "";

    function nodeStatusClass(node) {
      return node.status === "proposed-new" ? "proposed" : "existing";
    }

    function radiusFor(node) {
      if (node.id === graphData.hub) return 15;
      return Math.max(7, Math.min(13, 7 + Math.sqrt(node.degree || 1)));
    }

    function computeLayout() {
      const sorted = [...graphData.nodes].sort((a, b) => {
        if (a.id === graphData.hub) return -1;
        if (b.id === graphData.hub) return 1;
        return a.phase.localeCompare(b.phase) || a.id.localeCompare(b.id);
      });
      let index = 0;
      sorted.forEach((node) => {
        if (node.id === graphData.hub) {
          node.x = center.x;
          node.y = center.y;
          return;
        }
        index += 1;
        const angle = index * 2.3999632297;
        const radius = 105 + Math.sqrt(index) * 58;
        node.x = center.x + Math.cos(angle) * radius;
        node.y = center.y + Math.sin(angle) * radius;
      });
    }

    function createSvgElement(name, attrs = {}) {
      const element = document.createElementNS("http://www.w3.org/2000/svg", name);
      Object.entries(attrs).forEach(([key, value]) => element.setAttribute(key, value));
      return element;
    }

    function render() {
      svg.innerHTML = "";
      const edgeLayer = createSvgElement("g", { class: "edges" });
      const nodeLayer = createSvgElement("g", { class: "nodes" });
      svg.append(edgeLayer, nodeLayer);

      graphData.edges.forEach((edge, index) => {
        const source = nodeById.get(edge.source);
        const target = nodeById.get(edge.target);
        const line = createSvgElement("line", {
          class: "edge",
          "data-source": edge.source,
          "data-target": edge.target,
          x1: source.x,
          y1: source.y,
          x2: target.x,
          y2: target.y
        });
        edgeLayer.appendChild(line);
      });

      graphData.nodes.forEach((node) => {
        const group = createSvgElement("g", {
          class: `node ${nodeStatusClass(node)}`,
          transform: `translate(${node.x}, ${node.y})`,
          "data-id": node.id,
          tabindex: "0"
        });
        const color = phaseColors[phases.indexOf(node.phase) % phaseColors.length];
        const nodeRadius = radiusFor(node);
        const hitWidth = Math.min(250, Math.max(72, node.label.length * 6.8 + nodeRadius + 18));
        const hit = createSvgElement("rect", {
          class: "node-hit",
          x: -nodeRadius - 6,
          y: -16,
          width: hitWidth,
          height: 32,
          rx: 16
        });
        const circle = createSvgElement("circle", {
          r: nodeRadius,
          "data-phase": node.phase
        });
        circle.style.stroke = color;
        const text = createSvgElement("text", {
          x: nodeRadius + 6,
          y: 4
        });
        text.textContent = node.label;
        const title = createSvgElement("title");
        title.textContent = `${node.label} | ${node.phase}`;
        group.append(title, hit, circle, text);
        group.addEventListener("click", () => selectNode(node.id));
        group.addEventListener("keydown", (event) => {
          if (event.key === "Enter" || event.key === " ") selectNode(node.id);
        });
        nodeLayer.appendChild(group);
      });

      updateHighlight();
    }

    function visibleEdge(edge) {
      if (showHub.checked) return true;
      if (activeId === graphData.hub) return true;
      if (edge.source === graphData.hub || edge.target === graphData.hub) {
        return activeId && (edge.source === activeId || edge.target === activeId);
      }
      return true;
    }

    function updateHighlight() {
      const connected = activeId ? adjacency.get(activeId) || new Set() : new Set();
      svg.querySelectorAll(".edge").forEach((edge) => {
        const source = edge.dataset.source;
        const target = edge.dataset.target;
        const activeEdge = activeId && (source === activeId || target === activeId);
        const edgeVisible = visibleEdge({ source, target });
        edge.classList.toggle("hidden", !edgeVisible);
        edge.classList.toggle("active", Boolean(activeEdge));
        edge.classList.toggle("dim", Boolean(activeId && !activeEdge));
      });
      svg.querySelectorAll(".node").forEach((nodeElement) => {
        const id = nodeElement.dataset.id;
        const isActive = id === activeId;
        const isConnected = connected.has(id);
        nodeElement.classList.toggle("active", isActive);
        nodeElement.classList.toggle("connected", isConnected);
        nodeElement.classList.toggle("dim", Boolean(activeId && !isActive && !isConnected));
      });
    }

    function statusLabel(node) {
      if (node.status === "proposed-new") return "Proposed new";
      return "Existing";
    }

    function selectNode(id) {
      activeId = id;
      const node = nodeById.get(id);
      const connected = [...(adjacency.get(id) || [])].sort();
      details.innerHTML = `
        <div class="panel-title">${node.label}</div>
        <div class="panel-meta">${node.phase}</div>
        <div>
          <span class="pill ${node.status === "proposed-new" ? "proposed" : "existing"}">${statusLabel(node)}</span>
          <span class="pill ${node.docStatus.state}">${node.docStatus.label}</span>
        </div>
        <div class="section">
          <h2>Role</h2>
          <div class="detail-text">${escapeHtmlClient(node.role)}</div>
        </div>
        <div class="section">
          <h2>Boundary / Risk</h2>
          <div class="detail-text">${escapeHtmlClient(node.risk)}</div>
        </div>
        <div class="section">
          <h2>Direct Links: ${connected.length}</h2>
          <div class="chips">${connected.map((name) => `<button class="chip" type="button" data-jump="${name}">${name}</button>`).join("") || '<span class="panel-meta">No links.</span>'}</div>
        </div>
        <div class="section">
          <a class="button" href="${node.detailUrl}">Open skill page</a>
        </div>
      `;
      details.querySelectorAll("[data-jump]").forEach((button) => {
        button.addEventListener("click", () => selectNode(button.dataset.jump));
      });
      updateHighlight();
    }

    function escapeHtmlClient(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    search.addEventListener("input", () => {
      const query = search.value.trim().toLowerCase();
      const match = graphData.nodes.find((node) => node.id.toLowerCase().includes(query));
      if (query && match) selectNode(match.id);
      if (!query) {
        activeId = "";
        details.innerHTML = '<div class="panel-title">Select a skill</div><div class="panel-meta">Click any node to highlight its direct relationships.</div>';
        updateHighlight();
      }
    });
    showHub.addEventListener("change", updateHighlight);
    reset.addEventListener("click", () => {
      activeId = "";
      search.value = "";
      details.innerHTML = '<div class="panel-title">Select a skill</div><div class="panel-meta">Click any node to highlight its direct relationships.</div>';
      updateHighlight();
    });

    computeLayout();
    render();
  </script>
</body>
</html>
